<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentinel AI</title>
  <link rel="stylesheet" href="SentinalAI.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="logo-box">◎</div>
      </div>

      <div class="sidebar-menu">
        <button class="sidebar-btn primary" id="newChatBtn">+ New chat</button>
        <button class="sidebar-btn">Account</button>
      </div>

      <div class="sidebar-group">
        <div class="sidebar-heading">Recent chats</div>
        <div id="recentChats" class="recent-chats-empty">No chats yet</div>
      </div>
    </aside>

    <div class="main-panel">
      <div class="container">
        <header class="title-bar">
          <div class="brand-block">
            <div class="brand-title">Sentinel AI</div>
            <div class="brand-subtitle">Guardian Intelligence Interface</div>
          </div>
          <div class="status-badge">BETA</div>
        </header>

        <div class="persona-switcher">
          <div class="persona-label">Sentinel Mode</div>
          <div class="custom-dropdown">
            <select id="persona">
              <option value="Guardian">Guardian</option>
              <option value="Analyst">Analyst</option>
              <option value="Oracle">Oracle</option>
            </select>
            <span class="dropdown-arrow">▼</span>
          </div>
        </div>

        <div class="chat-area" id="chat">
          <div class="welcome-card">
            <h2>Welcome to Sentinel AI</h2>
            <p>
              Your intelligent cybersecurity assistant for guided analysis,
              secure interaction, and responsive multilingual support.
            </p>
          </div>
        </div>

        <audio id="botSound" src="reply-sound.mp3" preload="auto"></audio>

        <div class="input-bar">
          <input type="text" placeholder="Type your message..." id="userInput" />
          <button id="translateBtn" title="Toggle Bangla mode">বাংলা</button>
          <button id="uploadBtn" title="Upload image">📎</button>
          <button id="clearBtn" title="Clear chat">🗑</button>
          <button id="sendBtn" class="send-btn" title="Send">Send</button>
          <input type="file" id="fileInput" style="display: none;" />
        </div>
      </div>
    </div>
  </div>

  <script src="SentinalAI.js"></script>
</body>
</html>
